<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dragon Flight V37.3 iOS Fixed</title>
    <style>
        * { -webkit-touch-callout: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: #000; overflow: hidden; 
            touch-action: none; position: fixed; width: 100%; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        canvas { display: block; margin: 0 auto; background: #C2B280; }
        #ui { 
            position: absolute; top: env(safe-area-inset-top, 10px); left: 10px; 
            color: #fff; font-size: 14px; pointer-events: none; 
            text-shadow: 2px 2px 2px #000; z-index: 10; 
        }
        /* 버전 표시 스타일 추가 */
        #versionTag {
            position: absolute; top: env(safe-area-inset-top, 10px); right: 10px;
            color: rgba(255, 255, 255, 0.6); font-size: 10px; pointer-events: none;
            z-index: 10;
        }
        #gameOver {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #ff4d4d; text-align: center; display: none; z-index: 30;
            background: rgba(0,0,0,0.85); padding: 30px; border-radius: 20px; 
            border: 4px solid #fff; min-width: 200px; width: 70%;
        }
        #phaseText {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            color: #f1c40f; font-size: clamp(30px, 8vw, 48px); font-weight: bold; pointer-events: none;
            text-shadow: 0 0 10px #000, 0 0 20px #e67e22; opacity: 0; z-index: 25;
        }
        button { padding:10px 20px; font-size:16px; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>
    <div id="ui">
        Phase: <span id="curPhase">1</span> | Score: <span id="score">0</span> / <span id="target">500</span><br>
        Speed: <span id="speed">1.0</span>x | Life: <span id="life">3</span><br>
        Baby: <span id="babyCount">0</span> (Atk: <span id="babyAtk">1</span>x)
    </div>
    <!-- 버전 표시 태그 -->
    <div id="versionTag">v37.3</div>
    <div id="phaseText">1 Phase...</div>
    <div id="gameOver">
        <h1 style="font-size: 30px; margin: 0;">GAME OVER</h1>
        <p style="font-size: 20px; color: #fff; margin: 15px 0;">Score: <span id="finalScore">0</span></p>
        <button onclick="init()">다시 시작</button>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score'), lifeEl = document.getElementById('life'), targetEl = document.getElementById('target');
const babyCountEl = document.getElementById('babyCount'), babyAtkEl = document.getElementById('babyAtk');
const curPhaseEl = document.getElementById('curPhase'), phaseTextEl = document.getElementById('phaseText');
const speedEl = document.getElementById('speed');
const gameOverUI = document.getElementById('gameOver'), finalScoreEl = document.getElementById('finalScore');

function resize() {
    canvas.width = window.innerWidth > 500 ? 400 : window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize); resize();

let score, life, bulletCount, fireSpeedMultiplier, player, bullets, enemies, items, enemyBullets, lastSpawn, lastFire, bgOffset, isGameOver, phase, phaseOpacity, bossPresent, lastPatternTime, babyCount, nextBossScore, invincibilityTime, hitEffectOpacity;

function init() {
    score = 0; life = 3; bulletCount = 1; fireSpeedMultiplier = 1.0; phase = 1;
    player = { x: canvas.width / 2, y: canvas.height - 150 };
    bullets = []; enemies = []; items = []; enemyBullets = []; 
    babyCount = 0; 
    lastSpawn = 0; lastFire = 0; bgOffset = 0; isGameOver = false; bossPresent = false;
    nextBossScore = 500;
    invincibilityTime = 0; hitEffectOpacity = 0;
    gameOverUI.style.display = 'none'; updateUI();
}

function takeDamage() {
    if (invincibilityTime > 0) return;
    life--; invincibilityTime = 120; hitEffectOpacity = 1.0; updateUI();
    if (life <= 0) { isGameOver = true; finalScoreEl.innerText = score; gameOverUI.style.display = 'block'; }
}

function updateUI() {
    scoreEl.innerText = score; lifeEl.innerText = life;
    targetEl.innerText = (nextBossScore === Infinity) ? "BOSS!" : nextBossScore;
    babyCountEl.innerText = babyCount;
    speedEl.innerText = fireSpeedMultiplier.toFixed(1);
    let extra = Math.max(0, babyCount - 2);
    let atkMult = 1 + (extra * 0.5);
    babyAtkEl.innerText = atkMult.toFixed(1);
    curPhaseEl.innerText = phase;
}

function handleInput(e) {
    if (isGameOver) return;
    const clientX = (e.touches && e.touches.length > 0) ? e.touches[0].clientX : e.clientX;
    const clientY = (e.touches && e.touches.length > 0) ? e.touches[0].clientY : e.clientY;
    if (clientX === undefined || clientY === undefined) return;
    const rect = canvas.getBoundingClientRect();
    player.x = Math.max(20, Math.min(canvas.width - 20, clientX - rect.left));
    player.y = Math.max(50, Math.min(canvas.height - 50, clientY - rect.top));
}
canvas.addEventListener('touchstart', handleInput, { passive: false });
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleInput(e); }, { passive: false });
canvas.addEventListener('mousemove', handleInput);

function drawDragon(x, y, color, size, isEnemy = false, hp = 0, maxHp = 0, isBoss = false) {
    if (!isEnemy && invincibilityTime > 0 && Math.floor(invincibilityTime / 5) % 2 === 0) return;
    ctx.save(); ctx.translate(x, y); if (isEnemy && !isBoss) ctx.rotate(Math.PI);
    const s = size * 1.1;
    if (isBoss) {
        ctx.fillStyle = color; ctx.beginPath(); ctx.ellipse(0, -20, 100, 120, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(-40, -40, 20, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(40, -40, 20, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#f00'; ctx.beginPath(); ctx.arc(-40, -40, 10, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(40, -40, 10, 0, Math.PI*2); ctx.fill();
    } else {
        ctx.fillStyle = isEnemy ? '#95a5a6' : '#3498db';
        ctx.beginPath(); ctx.moveTo(-35*s, 0); ctx.lineTo(-10*s, -15*s); ctx.lineTo(-8*s, 15*s); ctx.fill();
        ctx.beginPath(); ctx.moveTo(35*s, 0); ctx.lineTo(10*s, -15*s); ctx.lineTo(8*s, 15*s); ctx.fill();
        ctx.fillStyle = color; ctx.beginPath(); ctx.ellipse(0, 0, 16*s, 26*s, 0, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(0, -22*s, 9*s, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
    if (isEnemy && maxHp > 0) {
        const barW = isBoss ? 200 : 40 * size; const barY = isBoss ? y + 110 : y - (45*size);
        ctx.fillStyle = '#444'; ctx.fillRect(x - barW/2, barY, barW, 8);
        ctx.fillStyle = '#2ecc71'; ctx.fillRect(x - barW/2, barY, barW * (hp/maxHp), 8);
    }
}

function spawnEnemy(forceType = null, isSummon = false) {
    if (bossPresent && !forceType) return;
    if (!forceType && !bossPresent && score >= nextBossScore) {
        enemies.push({ x: canvas.width/2, y: -200, hp: phase * 850, maxHp: phase * 850, color: '#8e44ad', isBoss: true, speed: 1.0, size: 3 });
        bossPresent = true; nextBossScore = Infinity;
        phaseTextEl.innerText = phase + " Phase Boss!"; phaseOpacity = 2.0; 
        updateUI(); return;
    }
    let enemy = { x: Math.random() * (canvas.width - 80) + 40, y: -80, lastFire: 0, isSummon: isSummon }; 
    if (forceType === 'mid' || (Math.random() > 0.75)) {
        enemy.hp = 22 + (phase - 1) * 22; enemy.maxHp = enemy.hp; enemy.score = isSummon ? 0 : 15;
        enemy.color = '#f39c12'; enemy.size = 1.4; enemy.speed = 1.5; enemy.type = 'mid'; enemy.dropG = isSummon ? 0 : 0.4;
    } else {
        enemy.hp = 5 + (phase - 1) * 5; enemy.maxHp = enemy.hp; enemy.score = isSummon ? 0 : 10;
        enemy.color = '#e74c3c'; enemy.size = 0.85; enemy.speed = 0.8; enemy.type = 'small'; enemy.dropG = isSummon ? 0 : 0.3;
    }
    enemies.push(enemy);
}

function executeBossPattern(boss) {
    let now = Date.now(); if (now - lastPatternTime < 2800) return;
    for(let n=0; n<Math.min(phase, 10); n++) {
        let rand = Math.floor(Math.random() * 5);
        const ts = 0.75; const spawnX = boss.x; const spawnY = boss.y + 40; 
        if (rand === 0) enemyBullets.push({ x: spawnX, y: spawnY, vx: 0, vy: (5+n*0.2) * ts, type: 'explode', stage: 0 });
        else if (rand === 1) for(let i=-2; i<=2; i++) enemyBullets.push({ x: spawnX, y: spawnY, vx: i*1.8 * ts, vy: (4+n*0.2) * ts, type: 'normal' });
        else if (rand === 2) for(let i=0; i<6; i++) enemyBullets.push({ x: Math.random()*canvas.width, y: -20, vx: 0, vy: (6+n*0.2) * ts, type: 'normal' });
        else if (rand === 3) { let sc = 2 + Math.min(phase, 5); for(let k=0; k<sc; k++) spawnEnemy(Math.random() > 0.5 ? 'mid' : 'small', true); }
        else if (rand === 4) enemyBullets.push({ y: spawnY, vy: 5 * ts, type: 'wide' });
    }
    lastPatternTime = now;
}

function update() {
    if (isGameOver) return;
    let now = Date.now();
    
    if (invincibilityTime > 0) invincibilityTime--;
    if (hitEffectOpacity > 0) hitEffectOpacity -= 0.05;
    if (phaseOpacity > 0) { phaseOpacity -= 0.02; phaseTextEl.style.opacity = Math.min(1, phaseOpacity); }
    
    if (now - lastFire > (400 / fireSpeedMultiplier)) {
        const startX = player.x - ((bulletCount - 1) * 18) / 2;
        for(let i=0; i<bulletCount; i++) bullets.push({ x: startX + (i*18), y: player.y - 40, dmg: 1, type: 'player' });
        
        let extra = Math.max(0, babyCount - 2);
        let bDmg = 1 + (extra * 0.5);
        if (babyCount >= 1) bullets.push({ x: player.x - 55, y: player.y + 20, vx: -0.5, vy: -10, dmg: bDmg, type: 'baby' });
        if (babyCount >= 2) bullets.push({ x: player.x + 55, y: player.y + 20, vx: 0.5, vy: -10, dmg: bDmg, type: 'baby' });
        
        lastFire = now;
    }
    
    let spawnInterval = 1100 / (1 + (phase * 0.25));
    if (!bossPresent && now - lastSpawn > spawnInterval) { spawnEnemy(); lastSpawn = now; }
    
    bullets.forEach((b, i) => { 
        b.y -= 12; b.x += (b.vx || 0); 
        if (b.y < -50) bullets.splice(i, 1); 
    });
    
    enemyBullets.forEach((eb, i) => {
        eb.y += eb.vy; eb.x += (eb.vx || 0);
        if (eb.type === 'wide') {
            if (eb.y > player.y - 20 && eb.y < player.y + 20) if (player.x > 60 && player.x < canvas.width - 60) takeDamage();
        } else if (eb.type === 'explode' && eb.stage === 0 && eb.y > canvas.height * 0.45) {
            for(let a=0; a<Math.PI*2; a+=Math.PI/4) enemyBullets.push({ x: eb.x, y: eb.y, vx: Math.cos(a)*3*0.75, vy: Math.sin(a)*3*0.75, type: 'normal' });
            enemyBullets.splice(i, 1); return;
        } else {
            if (Math.abs(eb.x - player.x) < 26 && Math.abs(eb.y - player.y) < 26) { takeDamage(); enemyBullets.splice(i, 1); }
        }
        if (eb.y > canvas.height + 150) enemyBullets.splice(i, 1);
    });

    enemies.forEach((e, i) => {
        if (e.isBoss) { if (e.y < 80) e.y += e.speed; else executeBossPattern(e); } 
        else { 
            e.y += e.speed; 
            if (now - e.lastFire > 2100) {
                const ts = 0.75;
                if (e.type === 'small') enemyBullets.push({ x: e.x, y: e.y + 20, vx: 0, vy: 3.5 * ts, type: 'normal' });
                else { for(let j=-1; j<=1; j++) enemyBullets.push({ x: e.x, y: e.y + 20, vx: j*1.3 * ts, vy: 3.5 * ts, type: 'normal' }); }
                e.lastFire = now;
            }
        }
        bullets.forEach((b, bi) => {
            let hitRange = e.isBoss ? 95 : 40*e.size;
            if (Math.abs(b.x - e.x) < hitRange && Math.abs(b.y - e.y) < hitRange) {
                bullets.splice(bi, 1); e.hp -= b.dmg;
                if (e.hp <= 0) {
                    if (e.isBoss) { 
                        bossPresent = false; phase++; nextBossScore = 500 * phase; 
                        for(let j=0; j<3; j++) items.push({ x: e.x - 40 + j*40, y: e.y - 20, type: 'G' });
                        for(let j=0; j<3; j++) items.push({ x: e.x - 40 + j*40, y: e.y + 30, type: 'L' });
                        items.push({ x: e.x, y: e.y + 80, type: 'M' });
                        if (Math.random() < 0.5) items.push({ x: e.x + 20, y: e.y + 80, type: 'M' });
                    } else { 
                        score += e.score; if (Math.random() < e.dropG) items.push({ x: e.x, y: e.y, type: 'G' }); 
                        else if (Math.random() < 0.1) items.push({ x: e.x, y: e.y, type: 'L' }); 
                    }
                    enemies.splice(i, 1); updateUI();
                    if(score >= nextBossScore) { phase++; nextBossScore += 500 * phase; updateUI(); }
                }
            }
        });
        if (Math.abs(e.x - player.x) < 35 && Math.abs(e.y - player.y) < 35) { takeDamage(); if(!e.isBoss) enemies.splice(i, 1); }
        if (e.y > canvas.height + 100) enemies.splice(i, 1);
    });

    items.forEach((it, i) => {
        it.y += 3;
        if (Math.abs(it.x - player.x) < 45 && Math.abs(it.y - player.y) < 45) {
            if (it.type === 'G') { if (bulletCount < 5) bulletCount++; else fireSpeedMultiplier += 0.2; }
            else if (it.type === 'L') { if (life < 5) life++; }
            else if (it.type === 'M') { babyCount++; }
            items.splice(i, 1); updateUI();
        }
    });
}

function draw() {
    bgOffset = (bgOffset + 2) % 80;
    ctx.fillStyle = '#C2B280'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#B0A070';
    for (let x = 0; x < canvas.width; x += 80) for (let y = -80; y < canvas.height; y += 80) ctx.fillRect(x + 5, y + bgOffset + 5, 70, 70);
    enemyBullets.forEach(eb => {
        if (eb.type === 'wide') { ctx.fillStyle = 'rgba(255, 0, 0, 0.4)'; ctx.fillRect(60, eb.y - 10, canvas.width - 120, 20); } 
        else { ctx.fillStyle = eb.type === 'explode' ? '#ff0' : '#f33'; ctx.beginPath(); ctx.arc(eb.x, eb.y, eb.type === 'explode' ? 10 : 6, 0, Math.PI*2); ctx.fill(); }
    });
    items.forEach(it => {
        ctx.fillStyle = it.type === 'G' ? '#f1c40f' : (it.type === 'L' ? '#e74c3c' : '#9b59b6');
        ctx.font = 'bold 24px Arial'; ctx.fillText(it.type, it.x - 10, it.y);
    });
    
    bullets.forEach(b => {
        if (b.type === 'baby') ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
        else ctx.fillStyle = '#fff';
        ctx.fillRect(b.x - 3, b.y - 12, 6, 18);
    });

    if (!isGameOver) { 
        drawDragon(player.x, player.y, '#3498db', 1); 
        if (babyCount >= 1) drawDragon(player.x - 55, player.y + 20, '#2ecc71', 0.5);
        if (babyCount >= 2) drawDragon(player.x + 55, player.y + 20, '#2ecc71', 0.5);
    }
    enemies.forEach(e => drawDragon(e.x, e.y, e.color, e.size, true, e.hp, e.maxHp, e.isBoss));
    if (hitEffectOpacity > 0) {
        let gr = ctx.createRadialGradient(canvas.width/2, canvas.height/2, canvas.width/4, canvas.width/2, canvas.height/2, canvas.height);
        gr.addColorStop(0, 'transparent'); gr.addColorStop(1, `rgba(255, 0, 0, ${hitEffectOpacity * 0.7})`);
        ctx.fillStyle = gr; ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    update(); requestAnimationFrame(draw);
}
init(); draw();
</script>
</body>
</html>
